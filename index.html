<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>NASW-IL DEIAB Committee — Operating System</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#15202B;
    --paper:#F6F7F9;
    --surface:#FFFFFF;
    --muted:#5C6773;
    --faint:#8A94A0;
    --line:#E2E6EC;
    --line-strong:#CBD3DC;

    --teal:#1F6A6E;          /* brand / primary */
    --teal-deep:#164E51;
    --teal-soft:#E7F1F1;
    --plum:#6A3D6B;          /* people / belonging accent */
    --plum-soft:#F1E9F1;

    /* status = the only place color carries meaning */
    --ok:#2E7D5B;     --ok-soft:#E6F2EC;
    --warn:#A86412;   --warn-soft:#FBF0DD;
    --risk:#BE3B2A;   --risk-soft:#FBE7E3;
    --info:#36608F;   --info-soft:#E7EFF7;
    --slate:#5C6773;  --slate-soft:#EDEFF2;

    --radius:10px;
    --radius-sm:7px;
    --shadow:0 1px 2px rgba(21,32,43,.04), 0 8px 24px rgba(21,32,43,.05);
    --display:"Spectral", Georgia, "Times New Roman", serif;
    --ui:"Inter", system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    --mono:ui-monospace, SFMono-Regular, "SF Mono", Menlo, monospace;
  }

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    font-family:var(--ui);
    color:var(--ink);
    background:var(--paper);
    font-size:15px;
    line-height:1.55;
    -webkit-font-smoothing:antialiased;
  }
  a{color:var(--teal);}

  /* ---------- Layout ---------- */
  .app{display:grid; grid-template-columns:264px 1fr; min-height:100vh;}
  .sidebar{
    background:var(--ink);
    color:#D7DEE6;
    padding:22px 16px 40px;
    position:sticky; top:0; height:100vh; overflow-y:auto;
  }
  .brand{display:flex; gap:11px; align-items:flex-start; padding:0 6px 18px; border-bottom:1px solid rgba(255,255,255,.09); margin-bottom:14px;}
  .brand .mark{
    width:34px;height:34px;border-radius:8px;flex:0 0 34px;
    background:linear-gradient(150deg,var(--teal),var(--plum));
    display:grid;place-items:center;color:#fff;font-family:var(--display);font-weight:700;font-size:17px;
  }
  .brand h1{font-family:var(--ui);font-size:13.5px;font-weight:600;margin:1px 0 2px;color:#fff;letter-spacing:.01em;line-height:1.3;}
  .brand p{margin:0;font-size:11px;color:#94A0AD;line-height:1.35;}

  .navgroup{margin:14px 0 4px;}
  .navgroup-label{font-size:10px;letter-spacing:.13em;text-transform:uppercase;color:#6E7C8A;padding:0 8px 5px;font-weight:600;}
  .navitem{
    display:flex;align-items:center;gap:9px;width:100%;text-align:left;
    background:none;border:none;color:#C4CDD7;font-family:var(--ui);font-size:13.5px;
    padding:7px 9px;border-radius:7px;cursor:pointer;line-height:1.25;
  }
  .navitem:hover{background:rgba(255,255,255,.06);color:#fff;}
  .navitem.active{background:var(--teal);color:#fff;font-weight:500;}
  .navitem .dot{width:6px;height:6px;border-radius:50%;flex:0 0 6px;background:currentColor;opacity:.55;}
  .navitem .badge{margin-left:auto;background:var(--risk);color:#fff;font-size:10.5px;font-weight:600;border-radius:9px;padding:1px 7px;min-width:18px;text-align:center;}
  .navitem .badge.warn{background:var(--warn);}
  .navitem .badge.muted{background:rgba(255,255,255,.16);color:#cfd7df;}

  .main{min-width:0;display:flex;flex-direction:column;}
  .topbar{
    position:sticky;top:0;z-index:20;
    background:rgba(246,247,249,.86);backdrop-filter:blur(8px);
    border-bottom:1px solid var(--line);
    padding:13px 30px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;
  }
  .topbar .crumb{font-size:12.5px;color:var(--muted);}
  .topbar .crumb b{color:var(--ink);font-weight:600;}
  .topbar .spacer{flex:1;}
  .savestate{font-size:11.5px;color:var(--faint);display:flex;align-items:center;gap:6px;}
  .savestate .pip{width:7px;height:7px;border-radius:50%;background:var(--ok);}
  .savestate.unsaved .pip{background:var(--warn);}

  .btn{
    font-family:var(--ui);font-size:12.5px;font-weight:500;cursor:pointer;
    border:1px solid var(--line-strong);background:var(--surface);color:var(--ink);
    padding:6px 12px;border-radius:7px;line-height:1.2;
  }
  .btn:hover{border-color:var(--teal);color:var(--teal-deep);}
  .btn.primary{background:var(--teal);border-color:var(--teal);color:#fff;}
  .btn.primary:hover{background:var(--teal-deep);color:#fff;}
  .btn.ghost{border-color:transparent;background:transparent;color:var(--muted);}
  .btn.ghost:hover{background:var(--slate-soft);color:var(--ink);}
  .btn.sm{font-size:11.5px;padding:4px 9px;}
  .btn.danger:hover{border-color:var(--risk);color:var(--risk);}

  .content{padding:26px 30px 80px;max-width:1080px;width:100%;}
  .view{display:none;}
  .view.active{display:block;animation:fade .25s ease;}
  @keyframes fade{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:none;}}

  /* ---------- Typography ---------- */
  .page-eyebrow{font-size:11px;letter-spacing:.13em;text-transform:uppercase;color:var(--teal);font-weight:600;margin:0 0 5px;}
  .page-title{font-family:var(--display);font-weight:600;font-size:30px;line-height:1.12;margin:0 0 6px;letter-spacing:-.01em;}
  .page-lede{color:var(--muted);font-size:14.5px;margin:0 0 22px;max-width:70ch;}
  h2.sec{font-family:var(--display);font-size:20px;font-weight:600;margin:30px 0 10px;letter-spacing:-.01em;}
  h3.sub{font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);margin:20px 0 8px;}

  /* ---------- Cards ---------- */
  .card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px 20px;margin-bottom:16px;}
  .card-head{display:flex;align-items:baseline;gap:10px;margin-bottom:6px;}
  .card-head h3{font-family:var(--display);font-size:17px;font-weight:600;margin:0;}
  .card-head .meta{margin-left:auto;font-size:11.5px;color:var(--faint);}

  .grid{display:grid;gap:14px;}
  .grid-2{grid-template-columns:repeat(2,1fr);}
  .grid-3{grid-template-columns:repeat(3,1fr);}
  .grid-4{grid-template-columns:repeat(4,1fr);}

  /* ---------- Dashboard tiles ---------- */
  .tile{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:15px 16px;box-shadow:var(--shadow);position:relative;overflow:hidden;}
  .tile .k{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--faint);font-weight:600;margin-bottom:6px;}
  .tile .v{font-family:var(--display);font-size:30px;font-weight:600;line-height:1;}
  .tile .v small{font-size:13px;color:var(--muted);font-family:var(--ui);font-weight:500;}
  .tile .sub{font-size:12px;color:var(--muted);margin-top:5px;}
  .tile .rail{position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--slate);}
  .tile.attn .rail{background:var(--risk);} .tile.attn .v{color:var(--risk);}
  .tile.warn .rail{background:var(--warn);}
  .tile.ok .rail{background:var(--ok);}
  .tile.info .rail{background:var(--info);}
  .tile.teal .rail{background:var(--teal);}

  .listcard ul{list-style:none;margin:0;padding:0;}
  .listcard li{display:flex;gap:9px;align-items:flex-start;padding:8px 0;border-top:1px solid var(--line);font-size:13.5px;}
  .listcard li:first-child{border-top:none;}
  .listcard li .lead{font-weight:500;}
  .listcard li .tail{margin-left:auto;font-size:11.5px;color:var(--faint);white-space:nowrap;padding-left:8px;}
  .empty{color:var(--faint);font-size:13px;font-style:italic;padding:6px 0;}

  /* ---------- Pills ---------- */
  .pill{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;padding:2px 9px;border-radius:20px;line-height:1.5;white-space:nowrap;}
  .pill.ok{background:var(--ok-soft);color:var(--ok);}
  .pill.warn{background:var(--warn-soft);color:var(--warn);}
  .pill.risk{background:var(--risk-soft);color:var(--risk);}
  .pill.info{background:var(--info-soft);color:var(--info);}
  .pill.slate{background:var(--slate-soft);color:var(--slate);}
  .pill.teal{background:var(--teal-soft);color:var(--teal-deep);}
  .pill.plum{background:var(--plum-soft);color:var(--plum);}

  /* ---------- Editable fields ---------- */
  [contenteditable]{outline:none;border-radius:6px;transition:background .12s;}
  [contenteditable]:hover{background:var(--paper);}
  [contenteditable]:focus{background:#fff;box-shadow:0 0 0 2px var(--teal-soft);}
  .editable-block{padding:7px 9px;margin:0 -9px;border-radius:7px;}
  .field-label{font-size:11px;letter-spacing:.07em;text-transform:uppercase;color:var(--faint);font-weight:600;margin:14px 0 3px;}
  .field-label:first-child{margin-top:0;}
  .prose{font-size:14.5px;line-height:1.6;}
  .prose.serif{font-family:var(--display);font-size:16px;}

  /* editable lists */
  .ed-list{list-style:none;margin:6px 0 0;padding:0;}
  .ed-list li{display:flex;gap:8px;align-items:flex-start;padding:3px 0;}
  .ed-list li .bullet{color:var(--teal);font-weight:700;flex:0 0 auto;padding-top:2px;}
  .ed-list li .txt{flex:1;padding:3px 7px;margin-left:-7px;border-radius:6px;}
  .ed-list li .x{opacity:0;border:none;background:none;color:var(--faint);cursor:pointer;font-size:14px;padding:2px 5px;}
  .ed-list li:hover .x{opacity:1;}
  .ed-list li .x:hover{color:var(--risk);}
  .add-line{font-size:12.5px;color:var(--teal);background:none;border:none;cursor:pointer;padding:6px 0 0;font-weight:500;}
  .add-line:hover{text-decoration:underline;}

  /* ---------- Tables ---------- */
  .tablewrap{overflow-x:auto;border:1px solid var(--line);border-radius:var(--radius);background:var(--surface);box-shadow:var(--shadow);}
  table.dt{border-collapse:collapse;width:100%;font-size:13px;min-width:640px;}
  table.dt thead th{
    text-align:left;font-size:10.5px;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);font-weight:600;
    padding:10px 11px;border-bottom:1px solid var(--line-strong);background:var(--paper);position:sticky;top:0;white-space:nowrap;
  }
  table.dt tbody td{padding:5px 8px;border-bottom:1px solid var(--line);vertical-align:top;}
  table.dt tbody tr:last-child td{border-bottom:none;}
  table.dt tbody tr:hover{background:#FCFCFD;}
  .cell-input{width:100%;border:none;background:transparent;font-family:var(--ui);font-size:13px;color:var(--ink);padding:4px 5px;border-radius:5px;resize:vertical;line-height:1.4;}
  .cell-input:hover{background:var(--paper);}
  .cell-input:focus{outline:none;background:#fff;box-shadow:0 0 0 2px var(--teal-soft);}
  textarea.cell-input{min-height:30px;}
  select.cell-input{cursor:pointer;-webkit-appearance:none;appearance:none;font-weight:600;padding-right:5px;}
  .row-x{border:none;background:none;color:var(--faint);cursor:pointer;font-size:15px;line-height:1;padding:4px 6px;border-radius:5px;opacity:0;}
  table.dt tr:hover .row-x{opacity:1;}
  .row-x:hover{color:var(--risk);background:var(--risk-soft);}
  .tablefoot{display:flex;align-items:center;gap:10px;padding:8px 11px;background:var(--paper);border-top:1px solid var(--line);}

  /* checkbox rows */
  .checkrow{display:flex;gap:10px;align-items:flex-start;padding:9px 0;border-top:1px solid var(--line);}
  .checkrow:first-child{border-top:none;}
  .checkrow input[type=checkbox]{margin-top:3px;width:17px;height:17px;accent-color:var(--teal);cursor:pointer;flex:0 0 auto;}
  .checkrow .ctxt{flex:1;padding:1px 7px;margin-left:-7px;border-radius:6px;font-size:14px;}
  .checkrow input:checked + .ctxt{color:var(--faint);text-decoration:line-through;}

  /* lifecycle stepper */
  .stepper{display:flex;flex-wrap:wrap;gap:5px;margin:12px 0;}
  .step{font-size:11.5px;font-weight:600;padding:5px 12px 5px 14px;background:var(--slate-soft);color:var(--slate);border-radius:4px;position:relative;}
  .step.done{background:var(--teal-soft);color:var(--teal-deep);}
  .step.current{background:var(--teal);color:#fff;}
  .step .n{opacity:.6;margin-right:5px;}

  .callout{border-left:3px solid var(--teal);background:var(--teal-soft);padding:11px 15px;border-radius:0 8px 8px 0;font-size:13.5px;color:var(--teal-deep);margin:14px 0;}
  .callout.warn{border-color:var(--warn);background:var(--warn-soft);color:var(--warn);}
  .callout b{color:inherit;}

  .infobar{display:flex;gap:12px;align-items:flex-start;background:var(--info-soft);border:1px solid #cfdcec;color:var(--info);padding:11px 15px;border-radius:9px;margin-bottom:20px;font-size:13px;}
  .infobar .x{margin-left:auto;background:none;border:none;color:var(--info);cursor:pointer;font-size:16px;padding:0 4px;}

  .pillar-tag{display:inline-block;width:9px;height:9px;border-radius:3px;margin-right:7px;vertical-align:-1px;}

  .twocol{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
  @media(max-width:1100px){ .grid-4{grid-template-columns:repeat(2,1fr);} .grid-3{grid-template-columns:repeat(2,1fr);} }
  @media(max-width:860px){
    .app{grid-template-columns:1fr;}
    .sidebar{position:static;height:auto;}
    .navwrap{display:none;}
    .navwrap.open{display:block;}
    .menubtn{display:inline-flex;}
    .twocol,.grid-2{grid-template-columns:1fr;}
    .content{padding:20px 16px 60px;}
    .topbar{padding:11px 16px;}
  }
  .menubtn{display:none;}

  /* print */
  @media print{
    .sidebar,.topbar,.no-print,.row-x,.add-line,.tablefoot .btn,.menubtn{display:none !important;}
    .app{display:block;}
    .view{display:block !important;page-break-before:always;}
    .view:first-of-type{page-break-before:avoid;}
    .content{max-width:none;padding:0;}
    body{background:#fff;font-size:11px;}
    .card,.tile,.tablewrap{box-shadow:none;break-inside:avoid;}
  }

  dialog{border:none;border-radius:14px;box-shadow:0 30px 80px rgba(21,32,43,.3);padding:0;max-width:560px;width:92vw;}
  dialog::backdrop{background:rgba(21,32,43,.4);}
  .modal-head{padding:18px 22px 0;}
  .modal-head h3{font-family:var(--display);font-size:20px;margin:0 0 4px;}
  .modal-head p{color:var(--muted);font-size:13px;margin:0;}
  .modal-body{padding:16px 22px;}
  .modal-foot{padding:14px 22px;border-top:1px solid var(--line);display:flex;gap:9px;justify-content:flex-end;background:var(--paper);border-radius:0 0 14px 14px;}
  .modal-body textarea{width:100%;min-height:160px;font-family:var(--mono);font-size:12px;border:1px solid var(--line-strong);border-radius:8px;padding:10px;}
</style>
</head>
<body>
<div class="app">
  <!-- ============ SIDEBAR ============ -->
  <aside class="sidebar">
    <div class="brand">
      <div class="mark">D</div>
      <div>
        <h1>DEIAB Committee</h1>
        <p>NASW&#8209;Illinois &middot; Operating System</p>
      </div>
    </div>
    <button class="btn ghost sm menubtn no-print" onclick="document.querySelector('.navwrap').classList.toggle('open')" style="margin-bottom:8px;color:#cfd7df;border-color:rgba(255,255,255,.15);">☰ Sections</button>
    <div class="navwrap" id="nav"><!-- nav rendered by JS --></div>
  </aside>

  <!-- ============ MAIN ============ -->
  <div class="main">
    <div class="topbar no-print">
      <div class="crumb">DEIAB Operating System <span style="color:var(--line-strong)">/</span> <b id="crumb">Dashboard</b></div>
      <div class="spacer"></div>
      <div class="savestate" id="saveState"><span class="pip"></span><span id="saveLabel">Saved locally</span></div>
      <button class="btn sm" onclick="doPrint()">Print / PDF</button>
      <button class="btn sm" onclick="openCopy()">Copy view</button>
      <button class="btn sm" onclick="exportJSON()">Back up</button>
      <button class="btn sm" onclick="document.getElementById('importFile').click()">Restore</button>
      <input type="file" id="importFile" accept="application/json" style="display:none" onchange="importJSON(event)">
    </div>
    <div class="content" id="content"><!-- views rendered by JS --></div>
  </div>
</div>

<!-- copy / export dialog -->
<dialog id="copyModal">
  <div class="modal-head"><h3>Copy this section</h3><p>Plain text formatted for Google Docs, Notion, Loop, or Canva Docs. Select all and copy.</p></div>
  <div class="modal-body"><textarea id="copyText" readonly></textarea></div>
  <div class="modal-foot">
    <button class="btn" onclick="document.getElementById('copyModal').close()">Close</button>
    <button class="btn primary" onclick="copyToClipboard()">Copy to clipboard</button>
  </div>
</dialog>

<script>
/* ============================================================
   STATE  — single source of truth.  Every view reads from here.
   ============================================================ */
const TODAY = new Date().toISOString().slice(0,10);
const fmtDate = d => d ? new Date(d+'T00:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}) : '—';

const SEED = {
  meta:{ updated:TODAY },
  todayMeeting:{
    date:TODAY,
    attendees:"Lorena, Winston",
    notes:"",
    parking:[]
  },
  charter:{

    vision:"A social work profession in Illinois where equity is structural, belonging is the norm, and social workers are resourced to practice with courage.",

      "Establish or formalize two community/organizational partnerships.",
      "Complete an accessibility review of NASW-IL events and communications."
    ]
  },
  roles:[
    {role:"Lorena — External & Facilitation Co-Chair", primary:"Leads meetings; facilitates discussion; public speaking; relationship-building; represents the committee publicly; fosters an inclusive environment where members feel heard.", backup:"Co-signs agendas; supports follow-up when Winston is unavailable.", notes:"Roles complement, not silo — both collaborate closely on strategy."},
    {role:"Winston — Operations & Systems Co-Chair", primary:"Operations; project management; agendas; action-item tracking; documentation; workflows; post-meeting follow-up; long-term planning.", backup:"Can facilitate a meeting or represent the committee if Lorena is unavailable.", notes:"Maintains this operating system as the committee's system of record."}

    decision:"Proposals are surfaced, discussed, and decided by consensus where possible; if consensus stalls, a simple majority of present members decides. Every decision is logged with date, owner, and deadline."
  },
  meetings:[],
  pillars:[
    {id:"edu", name:"Education", color:"#36608F", purpose:"Build member knowledge and skill in DEIAB practice through trainings, panels, and learning resources.", projects:"CE workshops; lunch-and-learn series; reading/resource lists.", owner:"", status:"Active", next:"Confirm first training topic & date."},
    {id:"adv", name:"Advocacy", color:"#BE3B2A", purpose:"Advance equity and social justice in policy and practice, and protect social workers' ability to advocate.", projects:"Legislative watch; action alerts; testimony support.", owner:"", status:"Planning", next:"Identify priority legislative issues."},
    {id:"com", name:"Community & Belonging", color:"#6A3D6B", purpose:"Create spaces where members feel they belong and where their expertise is valued.", projects:"Affinity spaces; mentorship; member spotlights.", owner:"", status:"Idea", next:"Survey members on belonging needs."},
    {id:"acc", name:"Accessibility & Inclusion", color:"#1F6A6E", purpose:"Make NASW-IL events, communications, and resources accessible to all members.", projects:"Event accessibility checklist; captioning standards; plain-language review.", owner:"", status:"Planning", next:"Draft event accessibility checklist."}

/* ============================================================
   GENERIC HELPERS for editable content
   ============================================================ */
function esc(s){ return (s==null?"":String(s)).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

// editable prose bound to a state path
function ce(path, opts={}){
  const val = getPath(path);
  const cls = opts.serif ? "prose serif editable-block" : "prose editable-block";
  return `<div class="${cls}" contenteditable="true" oninput="setPath('${path}', this.innerText)">${esc(val)}</div>`;
}
function getPath(p){ return p.split('.').reduce((o,k)=>o&&o[k],state); }
function setPath(p, v){
  const ks=p.split('.'); let o=state;
  for(let i=0;i<ks.length-1;i++) o=o[ks[i]];
  o[ks[ks.length-1]]=v; save();
}

// editable bullet list bound to an array path
function edList(arrPath, opts={}){
  const arr = getPath(arrPath) || [];
  const bullet = opts.bullet || "▸";
  return `<ul class="ed-list" id="edl_${arrPath.replace(/\./g,'_')}">
    ${arr.map((item,i)=>`<li>
      <span class="bullet">${bullet}</span>
      <span class="txt" contenteditable="true" oninput="updateArr('${arrPath}',${i},this.innerText)">${esc(item)}</span>
      <button class="x" title="Remove" onclick="removeArr('${arrPath}',${i})">×</button>
    </li>`).join("")}
  </ul>
  <button class="add-line" onclick="addArr('${arrPath}','${opts.placeholder||"New item"}')">+ Add</button>`;
}
function updateArr(path,i,v){ const a=getPath(path); a[i]=v; save(); }
function removeArr(path,i){ const a=getPath(path); a.splice(i,1); save(); go(activeView); }
function addArr(path,ph){ const a=getPath(path); a.push(""); save(); go(activeView); }

/* generic data table.
   schema: [{key,label,type,options,width}] ; type: text|area|select|date */
function dataTable(arrPath, schema){
  const arr = getPath(arrPath);
  const head = schema.map(c=>`<th${c.width?` style="width:${c.width}"`:""}>${c.label}</th>`).join("") + "<th></th>";
  const rows = arr.map((row,ri)=>{
    const cells = schema.map(c=>{
      const v = row[c.key];
      if(c.type==="select"){
        const opts=c.options.map(o=>`<option ${o===v?"selected":""}>${o}</option>`).join("");
        return `<td><select class="cell-input ${statusClassFor(c.key,v)}" onchange="setCell('${arrPath}',${ri},'${c.key}',this.value)">${opts}</select></td>`;
      }
      if(c.type==="area"){
        return `<td><textarea class="cell-input" rows="1" oninput="setCell('${arrPath}',${ri},'${c.key}',this.value)" placeholder="${c.ph||""}">${esc(v)}</textarea></td>`;
      }
      if(c.type==="date"){
        return `<td><input type="date" class="cell-input" value="${esc(v)}" onchange="setCell('${arrPath}',${ri},'${c.key}',this.value)"></td>`;
      }
      if(c.type==="pillar"){
        const opts=state.pillars.map(p=>`<option value="${p.id}" ${p.id===v?"selected":""}>${p.name}</option>`).join("");
        return `<td><select class="cell-input" onchange="setCell('${arrPath}',${ri},'${c.key}',this.value)">${opts}</select></td>`;
      }
      return `<td><input class="cell-input" value="${esc(v)}" oninput="setCell('${arrPath}',${ri},'${c.key}',this.value)" placeholder="${c.ph||""}"></td>`;
    }).join("");
    return `<tr>${cells}<td><button class="row-x" title="Delete row" onclick="delRow('${arrPath}',${ri})">×</button></td></tr>`;
  }).join("");
  return `<div class="tablewrap"><table class="dt">
    <thead><tr>${head}</tr></thead>
    <tbody>${rows || `<tr><td colspan="${schema.length+1}"><span class="empty">No entries yet.</span></td></tr>`}</tbody>
  </table>
  <div class="tablefoot"><button class="btn sm" onclick="addRow('${arrPath}', ${JSON.stringify(schema.map(s=>s.key)).replace(/"/g,'&quot;')})">+ Add row</button></div>
  </div>`;
}
function statusClassFor(key,v){
  if(!v) return "";
  const ok=["Done","Active","On track","Complete","Monitoring"];
  const warn=["In progress","Planning","At risk","On hold","Open"];
  const risk=["Blocked","Behind","Overdue"];
  if(ok.includes(v)) return "";
  if(risk.includes(v)) return "";
  return "";
}
function setCell(path,ri,key,val){ getPath(path)[ri][key]=val; save(); if(activeView==="dashboard")go("dashboard"); }
function delRow(path,ri){ getPath(path).splice(ri,1); save(); go(activeView); }
function addRow(path,keys){ const o={}; keys.forEach(k=>o[k]=""); getPath(path).push(o); save(); go(activeView); }

/* ============================================================
   ARCHIVE today's meeting into history
   ============================================================ */
function archiveMeeting(){
  const tm = state.todayMeeting;
  const snap = {
    date: tm.date,
    attendees: tm.attendees,
    notes: tm.notes,
    decisions: state.decisions.filter(d=>d.date===tm.date).map(d=>({decision:d.decision})),
    actions: state.actions.slice(0,8).map(a=>({task:a.task,owner:a.owner,due:a.due}))
  };
  state.meetings.push(snap);
  save();
  go('history');
}

/* ============================================================
   EXPORT / IMPORT / PRINT / COPY
   ============================================================ */
function exportJSON(){
  const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`DEIAB-committee-${TODAY}.json`;
  a.click();
}
function importJSON(e){
  const f=e.target.files[0]; if(!f)return;
  const r=new FileReader();
  r.onload=()=>{ try{ state=JSON.parse(r.result); save(); go(activeView); alert('Restored from backup.'); }catch(err){ alert('That file could not be read as a valid backup.'); } };
  r.readAsText(f);
  e.target.value='';
}
function doPrint(){ window.print(); }

function openCopy(){
  document.getElementById('copyText').value = plainTextFor(activeView);
  document.getElementById('copyModal').showModal();
}
function copyToClipboard(){
  const t=document.getElementById('copyText');
  t.select();
  navigator.clipboard?.writeText(t.value).then(()=>{
    const b=event.target; const o=b.textContent; b.textContent='Copied ✓'; setTimeout(()=>b.textContent=o,1400);
  }).catch(()=>{ document.execCommand('copy'); });
}

/* flatten a view to clean plain text for pasting elsewhere */
function plainTextFor(v){
  const L=[]; const h=s=>L.push('\n'+s.toUpperCase()+'\n'+'─'.repeat(s.length));
  const c=s=>state.charter[s];
  switch(v){
    case 'charter':
      h('Committee Charter');
      L.push('\nMission\n'+c('mission'));
      L.push('\nVision\n'+c('vision'));
      L.push('\nScope\n'+c('scope'));
      L.push('\nGuiding principles'); c('principles').forEach(p=>L.push('• '+p));
      L.push('\nCommittee authority\n'+c('authority'));
      L.push('\nRelationship to the Board\n'+c('board'));
      L.push('\nAnnual objectives'); c('objectives').forEach(o=>L.push('• '+o));
      break;
    case 'roles':
      h('Co-Chair Roles');
      state.roles.forEach(r=>{L.push('\n'+r.role);L.push('  Primary: '+r.primary);L.push('  Backup: '+r.backup);if(r.notes)L.push('  Notes: '+r.notes);});
      break;
    case 'structure':
      h('Meeting Structure');
      L.push('\nCadence: '+state.meetingTemplate.cadence);
      L.push('\nStandard agenda'); state.meetingTemplate.agenda.forEach(a=>L.push('• '+a));
      L.push('\nCheck-in questions'); state.meetingTemplate.checkins.forEach(a=>L.push('• '+a));
      L.push('\nDecision-making\n'+state.meetingTemplate.decision);
      break;
    case 'actions':
      h('Action Item Tracker');
      state.actions.forEach(a=>L.push(`• ${a.task} — ${a.owner||'Unassigned'} | due ${a.due?fmtDate(a.due):'—'} | ${a.priority||'—'} | ${a.status||'—'}`));
      break;
    case 'decisions':
      h('Decision Log');
      state.decisions.forEach(d=>L.push(`• [${fmtDate(d.date)}] ${d.decision}${d.context?' — '+d.context:''}`));
      break;
    case 'questions':
      h('Questions for Joel & LaTasha');
      state.questions.forEach(q=>L.push(`• ${q.q}${q.answer?'\n    → '+q.answer:''}`));
      break;
    case 'campaign':
      h('Courageous Care, Collective Power');
      L.push('\nPurpose\n'+state.campaign.purpose);
      L.push('\nHow the committee supports it'); state.campaign.support.forEach(s=>L.push('• '+s));
      L.push('\nMonthly content ideas'); state.campaign.content.forEach(s=>L.push('• '+s));
      L.push('\nMember engagement ideas'); state.campaign.engagement.forEach(s=>L.push('• '+s));
      break;
    case 'draft':
      h('Draft to Share with Joel & LaTasha');
      L.push('\n'+state.draftNote);
      L.push('\nProposed co-chair roles'); state.roles.forEach(r=>L.push('• '+r.role+' — '+r.primary));
      L.push('\nProposed meeting cadence\n'+state.meetingTemplate.cadence);
      L.push('\nProposed committee pillars'); state.pillars.forEach(p=>L.push('• '+p.name+' — '+p.purpose));
      L.push('\nFirst three action steps'); state.actions.slice(0,3).forEach((a,i)=>L.push(`${i+1}. ${a.task} — ${a.owner||'Unassigned'}${a.due?' (due '+fmtDate(a.due)+')':''}`));
      L.push('\nOur open questions'); state.questions.filter(q=>!q.done).forEach(q=>L.push('• '+q.q));
      break;
    case 'initiatives':
      h('Initiative Portfolio');
      state.initiatives.forEach(i=>L.push(`• ${i.name} [${pillarName(i.pillar)}] — phase: ${i.phase} | priority: ${i.priority} | status: ${i.status}`));
      break;
    case 'goals':
      h('Annual Goals'); state.goals.forEach(g=>L.push(`• ${g.goal}: ${g.current}/${g.target} ${g.metric} — ${g.status}`)); break;
    case 'pillars':
      h('Project Pillars'); state.pillars.forEach(p=>L.push(`\n${p.name} (${p.status})\n  Purpose: ${p.purpose}\n  Projects: ${p.projects}\n  Owner: ${p.owner||'—'}\n  Next: ${p.next}`)); break;
    default:
      L.push('Use Copy view on the Charter, Roles, Meeting Structure, Actions, Decisions, Campaign, Questions, or Draft sections for formatted text.');
  }
  return L.join('\n').trim();
}
